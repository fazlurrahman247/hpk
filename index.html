<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Input Data 1000 HPK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .custom-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05); }
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen py-8 px-4">
    <div class="max-w-3xl mx-auto">
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-slate-800 tracking-tight">Laporan 1000 HPK</h1>
            <p class="text-slate-500 mt-2">Sistem Pencatatan Hari Pertama Kehidupan Terintegrasi</p>
        </div>

        <!-- Form Card -->
        <div class="bg-white rounded-2xl custom-shadow border border-slate-100 overflow-hidden">
            <form id="hpkForm" class="p-6 md:p-8 space-y-8">
                
                <!-- Section: Identitas -->
                <div class="space-y-4">
                    <div class="flex items-center gap-2 pb-2 border-b border-slate-100">
                        <svg class="w-5 h-5 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                        <h3 class="font-semibold text-slate-800">Identitas Utama</h3>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-1">
                            <label class="text-sm font-medium text-slate-700">NIK (Kolom B)</label>
                            <input type="text" name="nik" placeholder="Masukkan 16 digit NIK" class="w-full px-4 py-2.5 rounded-lg border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all" required>
                        </div>
                        <div class="space-y-1">
                            <label class="text-sm font-medium text-slate-700">Nama (Kolom R)</label>
                            <input type="text" name="nama" placeholder="Nama lengkap ibu/anak" class="w-full px-4 py-2.5 rounded-lg border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all" required>
                        </div>
                    </div>
                </div>

                <!-- Section: Usia Anak -->
                <div class="space-y-4">
                    <div class="flex items-center gap-2 pb-2 border-b border-slate-100">
                        <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        <h3 class="font-semibold text-slate-800">Usia Anak (Bulan/Tahun)</h3>
                    </div>
                    <div class="grid grid-cols-2 sm:grid-cols-5 gap-3">
                        <div class="space-y-1">
                            <label class="text-[10px] uppercase font-bold text-slate-500 px-1">0-1 Th</label>
                            <input type="number" name="anak01" placeholder="0" class="w-full text-center px-2 py-2 rounded-lg border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] uppercase font-bold text-slate-500 px-1">1-2 Th</label>
                            <input type="number" name="anak12" placeholder="0" class="w-full text-center px-2 py-2 rounded-lg border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] uppercase font-bold text-slate-500 px-1">2-3 Th</label>
                            <input type="number" name="anak23" placeholder="0" class="w-full text-center px-2 py-2 rounded-lg border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] uppercase font-bold text-slate-500 px-1">3-4 Th</label>
                            <input type="number" name="anak34" placeholder="0" class="w-full text-center px-2 py-2 rounded-lg border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] uppercase font-bold text-slate-500 px-1">4-5 Th</label>
                            <input type="number" name="anak45" placeholder="0" class="w-full text-center px-2 py-2 rounded-lg border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                    </div>
                </div>

                <!-- Section: Kelahiran -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-1">
                        <label class="text-sm font-medium text-slate-700 italic">Jarak Lahir Anak 1 & 2 (Y)</label>
                        <input type="text" name="jarak_kelahiran" placeholder="Contoh: 2 Tahun" class="w-full px-4 py-2.5 rounded-lg border border-slate-200 focus:ring-2 focus:ring-slate-500 outline-none">
                    </div>
                    <div class="space-y-1">
                        <label class="text-sm font-medium text-slate-700 italic">Berat/Panjang Lahir (Z)</label>
                        <input type="text" name="berat_lahir" placeholder="Contoh: 3.2kg / 48cm" class="w-full px-4 py-2.5 rounded-lg border border-slate-200 focus:ring-2 focus:ring-slate-500 outline-none">
                    </div>
                </div>

                <!-- Section: Kontrasepsi -->
                <div class="bg-slate-50 p-5 rounded-xl border border-slate-200">
                    <div class="flex items-center gap-2 mb-4">
                        <svg class="w-5 h-5 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        <h3 class="font-semibold text-slate-800">Metode Kontrasepsi (KB)</h3>
                    </div>
                    <div class="grid grid-cols-2 sm:grid-cols-4 gap-4">
                        <label class="flex items-center p-3 bg-white border border-slate-200 rounded-lg cursor-pointer hover:bg-emerald-50 transition-colors">
                            <input type="checkbox" name="kondom" value="V" class="w-4 h-4 text-emerald-600 rounded focus:ring-emerald-500">
                            <span class="ml-3 text-sm font-medium text-slate-700">Kondom</span>
                        </label>
                        <label class="flex items-center p-3 bg-white border border-slate-200 rounded-lg cursor-pointer hover:bg-emerald-50 transition-colors">
                            <input type="checkbox" name="pil" value="V" class="w-4 h-4 text-emerald-600 rounded focus:ring-emerald-500">
                            <span class="ml-3 text-sm font-medium text-slate-700">Pil</span>
                        </label>
                        <label class="flex items-center p-3 bg-white border border-slate-200 rounded-lg cursor-pointer hover:bg-emerald-50 transition-colors">
                            <input type="checkbox" name="suntik" value="V" class="w-4 h-4 text-emerald-600 rounded focus:ring-emerald-500">
                            <span class="ml-3 text-sm font-medium text-slate-700">Suntik</span>
                        </label>
                        <label class="flex items-center p-3 bg-white border border-slate-200 rounded-lg cursor-pointer hover:bg-emerald-50 transition-colors">
                            <input type="checkbox" name="implan" value="V" class="w-4 h-4 text-emerald-600 rounded focus:ring-emerald-500">
                            <span class="ml-3 text-sm font-medium text-slate-700">Implan</span>
                        </label>
                        <label class="flex items-center p-3 bg-white border border-slate-200 rounded-lg cursor-pointer hover:bg-emerald-50 transition-colors">
                            <input type="checkbox" name="iud" value="V" class="w-4 h-4 text-emerald-600 rounded focus:ring-emerald-500">
                            <span class="ml-3 text-sm font-medium text-slate-700">IUD</span>
                        </label>
                        <label class="flex items-center p-3 bg-white border border-slate-200 rounded-lg cursor-pointer hover:bg-emerald-50 transition-colors">
                            <input type="checkbox" name="mop" value="V" class="w-4 h-4 text-emerald-600 rounded focus:ring-emerald-500">
                            <span class="ml-3 text-sm font-medium text-slate-700">MOP</span>
                        </label>
                        <label class="flex items-center p-3 bg-white border border-slate-200 rounded-lg cursor-pointer hover:bg-emerald-50 transition-colors">
                            <input type="checkbox" name="mow" value="V" class="w-4 h-4 text-emerald-600 rounded focus:ring-emerald-500">
                            <span class="ml-3 text-sm font-medium text-slate-700">MOW</span>
                        </label>
                        <label class="flex items-center p-3 bg-white border-red-200 rounded-lg cursor-pointer hover:bg-red-50 transition-colors">
                            <input type="checkbox" name="tidak_kb" value="V" class="w-4 h-4 text-red-600 rounded focus:ring-red-500 border-red-300">
                            <span class="ml-3 text-sm font-bold text-red-600">Tidak KB</span>
                        </label>
                    </div>
                </div>

                <!-- Section: Stunting -->
                <div class="space-y-4">
                    <h3 class="text-sm font-bold text-slate-700 uppercase tracking-wider text-center">Status Anak Stunting</h3>
                    <div class="flex flex-col sm:flex-row gap-4 justify-center">
                        <label class="relative flex items-center justify-center px-8 py-3 bg-white border-2 border-slate-200 rounded-xl cursor-pointer hover:border-red-400 has-[:checked]:border-red-500 has-[:checked]:bg-red-50 transition-all group">
                            <input type="radio" name="stunting" value="ya" class="absolute opacity-0" required>
                            <span class="text-slate-600 font-semibold group-has-[:checked]:text-red-700">YA, Stunting</span>
                        </label>
                        <label class="relative flex items-center justify-center px-8 py-3 bg-white border-2 border-slate-200 rounded-xl cursor-pointer hover:border-emerald-400 has-[:checked]:border-emerald-500 has-[:checked]:bg-emerald-50 transition-all group">
                            <input type="radio" name="stunting" value="tidak" class="absolute opacity-0">
                            <span class="text-slate-600 font-semibold group-has-[:checked]:text-emerald-700">TIDAK Stunting</span>
                        </label>
                    </div>
                </div>

                <!-- Submit Area -->
                <div class="pt-4">
                    <button type="submit" id="btn" class="w-full py-4 bg-slate-900 hover:bg-indigo-700 text-white font-bold rounded-xl shadow-lg transform active:scale-95 transition-all duration-200 flex items-center justify-center gap-3">
                        <span id="btnText">Kirim Data ke Google Sheets</span>
                        <div id="btnLoader" class="hidden w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
                    </button>
                    <p id="msg" class="text-center mt-4 text-sm font-medium hidden"></p>
                </div>
            </form>
        </div>
        
        <p class="text-center text-slate-400 text-xs mt-8">&copy; 2024 Tim Pendamping Keluarga - Sistem Laporan Terintegrasi</p>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwgxDHhZ9IgCl05KBxTXPxg6gNsAxnTVTNhuTRvh_t54x-xfcAGinlUGEysj2fBB-yh/exec';
        const form = document.getElementById('hpkForm');
        const btn = document.getElementById('btn');
        const btnText = document.getElementById('btnText');
        const btnLoader = document.getElementById('btnLoader');
        const msg = document.getElementById('msg');

        form.addEventListener('submit', e => {
            e.preventDefault();
            
            // UI State Loading
            btn.disabled = true;
            btnText.innerHTML = "Memproses Data...";
            btnLoader.classList.remove('hidden');
            msg.classList.add('hidden');

            const formData = new FormData(form);
            
            // Logika Penataan Radio Button Stunting ke Kolom AJ-AK
            const stuntingVal = formData.get('stunting');
            if(stuntingVal === 'ya') formData.append('stunting_ya', 'V');
            if(stuntingVal === 'tidak') formData.append('stunting_tidak', 'V');

            fetch(scriptURL, { method: 'POST', body: formData})
                .then(response => {
                    // Success UI
                    showFeedback("Data berhasil disimpan ke sistem!", "text-emerald-600");
                    form.reset();
                    resetButton();
                })
                .catch(error => {
                    // Error UI
                    showFeedback("Gagal mengirim: " + error.message, "text-red-600");
                    resetButton();
                });
        });

        function showFeedback(text, colorClass) {
            msg.innerHTML = text;
            msg.className = `text-center mt-4 text-sm font-semibold ${colorClass}`;
            msg.classList.remove('hidden');
        }

        function resetButton() {
            btn.disabled = false;
            btnText.innerHTML = "Kirim Data ke Google Sheets";
            btnLoader.classList.add('hidden');
        }
    </script>
</body>
</html>
